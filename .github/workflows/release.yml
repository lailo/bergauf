name: Release

on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag (e.g. v0.2.0) — must already exist'
        required: true
        type: string

permissions:
  contents: write

jobs:
  check:
    name: Lint, typecheck, test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - run: bun install --frozen-lockfile
      - run: bun run lint
      - run: bun run typecheck
      - run: bun test

  build:
    name: Build all targets
    needs: check
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - run: bun install --frozen-lockfile

      - name: Resolve version
        id: version
        env:
          REF_NAME: ${{ github.ref_name }}
          DISPATCH_TAG: ${{ inputs.tag }}
        run: |
          if [ -n "$DISPATCH_TAG" ]; then
            echo "version=$DISPATCH_TAG" >> "$GITHUB_OUTPUT"
          else
            echo "version=$REF_NAME" >> "$GITHUB_OUTPUT"
          fi

      - name: Build all targets
        run: bun run build

      - name: Generate checksums
        working-directory: dist
        run: sha256sum bergauf-* > SHA256SUMS.txt

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: bergauf-binaries
          path: |
            dist/bergauf-*
            dist/SHA256SUMS.txt
          if-no-files-found: error
          retention-days: 30

  release:
    name: Publish GitHub release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: bergauf-binaries
          path: dist

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.build.outputs.version }}
          name: ${{ needs.build.outputs.version }}
          generate_release_notes: true
          fail_on_unmatched_files: true
          files: |
            dist/bergauf-darwin-arm64
            dist/bergauf-darwin-x64
            dist/bergauf-linux-x64
            dist/bergauf-linux-arm64
            dist/bergauf-windows-x64.exe
            dist/SHA256SUMS.txt
